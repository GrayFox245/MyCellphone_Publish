<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dov Fuchs Digital Art</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">Dov Fuchs Digital Art</div>

        <label class="label" for="searchInput">Search by name…</label>
        <input
          id="searchInput"
          class="input"
          type="text"
          placeholder="Search by name..."
          autocomplete="off"
        />

        <label class="label" for="themeSelect">Theme</label>
        <select id="themeSelect" class="select">
          <option value="">All Themes</option>
        </select>

        <label class="label" for="sortSelect">Sort</label>
        <select id="sortSelect" class="select">
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
        </select>
      </aside>

      <main class="main">
        <div class="topbar">
          <div id="status" class="status"></div>
          <div id="countLabel" class="count"></div>
        </div>

        <div id="grid" class="grid"></div>
      </main>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" aria-hidden="true">
      <button id="lightboxClose" class="lightboxClose" aria-label="Close">×</button>
      <div class="lightboxInner">
        <img id="lightboxImg" class="lightboxImg" alt="" />
        <div id="lightboxTitle" class="lightboxTitle"></div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
